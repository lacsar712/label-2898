{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/attendance_staff_management.css">
<style>
    .asd-page {
        max-width: 100%;
    }

    .asd-back-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--primary-blue);
        text-decoration: none;
        font-size: 0.9rem;
        margin-bottom: 20px;
        padding: 8px 16px;
        border: 1px solid rgba(0, 210, 255, 0.25);
        border-radius: 4px;
        transition: all 0.25s;
        background: rgba(0, 210, 255, 0.04);
    }

    .asd-back-btn:hover {
        background: rgba(0, 210, 255, 0.12);
        border-color: var(--primary-blue);
        box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        color: #fff;
    }

    .asd-section {
        background: var(--panel-bg);
        border: var(--border-glow);
        padding: 30px;
        margin-bottom: 25px;
    }

    .asd-section-title {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--primary-blue);
        font-size: 1.1rem;
        font-weight: bold;
        letter-spacing: 1px;
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(0, 210, 255, 0.15);
    }

    .asd-section-title i {
        font-size: 1.25rem;
        text-shadow: var(--text-glow);
    }

    .asd-profile-header {
        display: flex;
        align-items: center;
        gap: 30px;
        padding: 20px;
        background: linear-gradient(135deg, rgba(0, 210, 255, 0.06) 0%, rgba(0, 210, 255, 0.02) 100%);
        border: 1px solid rgba(0, 210, 255, 0.1);
        border-radius: 8px;
        margin-bottom: 25px;
    }

    .asd-avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(0, 210, 255, 0.2), rgba(0, 255, 136, 0.15));
        border: 2px solid rgba(0, 210, 255, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        color: var(--primary-blue);
        font-weight: bold;
        text-shadow: var(--text-glow);
        flex-shrink: 0;
    }

    .asd-row-inactive .asd-avatar {
        background: linear-gradient(135deg, rgba(136, 136, 136, 0.2), rgba(100, 100, 100, 0.15));
        border-color: rgba(136, 136, 136, 0.4);
        color: #888;
        text-shadow: none;
    }

    .asd-profile-info {
        flex: 1;
        min-width: 0;
    }

    .asd-profile-name-row {
        display: flex;
        align-items: center;
        gap: 15px;
        flex-wrap: wrap;
        margin-bottom: 12px;
    }

    .asd-profile-name {
        font-size: 1.6rem;
        font-weight: bold;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .asd-row-inactive .asd-profile-name {
        filter: saturate(0.4);
        opacity: 0.7;
    }

    .asd-profile-no {
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 0.95rem;
        color: var(--primary-blue);
        background: rgba(0, 210, 255, 0.08);
        padding: 4px 12px;
        border-radius: 4px;
        border: 1px solid rgba(0, 210, 255, 0.2);
    }

    .asd-profile-meta {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        color: rgba(255, 255, 255, 0.65);
        font-size: 0.9rem;
    }

    .asd-profile-meta span {
        display: inline-flex;
        align-items: center;
        gap: 6px;
    }

    .asd-profile-meta i {
        font-size: 0.95rem;
        color: rgba(0, 210, 255, 0.7);
    }

    .asd-info-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 18px;
    }

    .asd-info-item {
        padding: 14px 16px;
        background: rgba(0, 210, 255, 0.03);
        border: 1px solid rgba(0, 210, 255, 0.08);
        border-radius: 6px;
        transition: all 0.2s;
    }

    .asd-info-item:hover {
        background: rgba(0, 210, 255, 0.06);
        border-color: rgba(0, 210, 255, 0.18);
    }

    .asd-info-label {
        font-size: 0.78rem;
        color: rgba(255, 255, 255, 0.45);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
    }

    .asd-info-value {
        font-size: 0.95rem;
        color: rgba(255, 255, 255, 0.88);
        font-weight: 500;
    }

    .asd-info-value.empty {
        color: rgba(255, 255, 255, 0.3);
        font-style: italic;
    }

    .asd-summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 15px;
        margin-bottom: 25px;
    }

    .asd-summary-card {
        padding: 18px;
        background: rgba(0, 210, 255, 0.04);
        border: 1px solid rgba(0, 210, 255, 0.12);
        border-radius: 8px;
        text-align: center;
        transition: all 0.25s;
    }

    .asd-summary-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(0, 210, 255, 0.15);
        border-color: rgba(0, 210, 255, 0.25);
    }

    .asd-summary-card.total {
        background: linear-gradient(135deg, rgba(0, 210, 255, 0.1), rgba(0, 210, 255, 0.03));
    }

    .asd-summary-card.present {
        background: linear-gradient(135deg, rgba(0, 255, 136, 0.08), rgba(0, 255, 136, 0.02));
        border-color: rgba(0, 255, 136, 0.2);
    }

    .asd-summary-card.late {
        background: linear-gradient(135deg, rgba(255, 193, 7, 0.08), rgba(255, 193, 7, 0.02));
        border-color: rgba(255, 193, 7, 0.2);
    }

    .asd-summary-card.absent {
        background: linear-gradient(135deg, rgba(255, 65, 54, 0.08), rgba(255, 65, 54, 0.02));
        border-color: rgba(255, 65, 54, 0.2);
    }

    .asd-summary-card.leave {
        background: linear-gradient(135deg, rgba(156, 39, 176, 0.08), rgba(156, 39, 176, 0.02));
        border-color: rgba(156, 39, 176, 0.2);
    }

    .asd-summary-card.hours {
        background: linear-gradient(135deg, rgba(78, 205, 196, 0.08), rgba(78, 205, 196, 0.02));
        border-color: rgba(78, 205, 196, 0.2);
    }

    .asd-summary-value {
        font-size: 1.8rem;
        font-weight: bold;
        font-family: 'Consolas', 'Monaco', monospace;
        margin-bottom: 4px;
    }

    .asd-summary-card.total .asd-summary-value { color: var(--primary-blue); }
    .asd-summary-card.present .asd-summary-value { color: #00ff88; }
    .asd-summary-card.late .asd-summary-value { color: #ffc107; }
    .asd-summary-card.absent .asd-summary-value { color: #ff6b6b; }
    .asd-summary-card.leave .asd-summary-value { color: #ce93d8; }
    .asd-summary-card.hours .asd-summary-value { color: #4ecdc4; }

    .asd-summary-label {
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.55);
        letter-spacing: 0.5px;
    }

    .asd-filters {
        display: flex;
        align-items: flex-end;
        gap: 20px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }

    .asd-filter-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .asd-filter-group label {
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.6);
    }

    .asd-filter-group .input-tech {
        width: 180px;
        margin-bottom: 0;
    }

    .asd-table-wrapper {
        overflow-x: auto;
        border: 1px solid rgba(0, 210, 255, 0.15);
        margin-bottom: 20px;
        background: rgba(0, 10, 25, 0.4);
    }

    .asd-table {
        width: 100%;
        border-collapse: collapse;
        min-width: 700px;
    }

    .asd-table thead {
        background: linear-gradient(90deg, rgba(0, 210, 255, 0.12) 0%, rgba(0, 210, 255, 0.05) 100%);
        position: relative;
    }

    .asd-table thead::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--primary-blue), transparent);
    }

    .asd-table th {
        padding: 14px 16px;
        text-align: left;
        color: var(--primary-blue);
        font-weight: 600;
        font-size: 0.9rem;
        letter-spacing: 0.5px;
        border-bottom: 1px solid rgba(0, 210, 255, 0.2);
        text-transform: uppercase;
        font-family: 'Consolas', 'Monaco', monospace;
        white-space: nowrap;
    }

    .asd-table td {
        padding: 14px 16px;
        color: rgba(255, 255, 255, 0.85);
        font-size: 0.9rem;
        border-bottom: 1px solid rgba(0, 210, 255, 0.06);
        transition: all 0.3s ease;
        vertical-align: middle;
    }

    .asd-table tbody tr {
        transition: all 0.2s;
    }

    .asd-table tbody tr:hover {
        background: rgba(0, 210, 255, 0.06);
    }

    .asd-att-status {
        display: inline-block;
        padding: 3px 10px;
        font-size: 0.78rem;
        border-radius: 3px;
        font-weight: 500;
    }

    .asd-att-present {
        background: rgba(0, 255, 136, 0.12);
        color: #00ff88;
        border: 1px solid rgba(0, 255, 136, 0.3);
    }

    .asd-att-late {
        background: rgba(255, 193, 7, 0.12);
        color: #ffc107;
        border: 1px solid rgba(255, 193, 7, 0.3);
    }

    .asd-att-early {
        background: rgba(255, 152, 0, 0.12);
        color: #ff9800;
        border: 1px solid rgba(255, 152, 0, 0.3);
    }

    .asd-att-absent {
        background: rgba(255, 65, 54, 0.12);
        color: #ff6b6b;
        border: 1px solid rgba(255, 65, 54, 0.3);
    }

    .asd-att-leave {
        background: rgba(156, 39, 176, 0.12);
        color: #ce93d8;
        border: 1px solid rgba(156, 39, 176, 0.3);
    }

    .asd-att-overtime {
        background: rgba(33, 150, 243, 0.12);
        color: #64b5f6;
        border: 1px solid rgba(33, 150, 243, 0.3);
    }

    .asd-pagination {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 15px;
        border-top: 1px solid rgba(0, 210, 255, 0.1);
        flex-wrap: wrap;
        gap: 15px;
    }

    .asd-page-info {
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.85rem;
    }

    .asd-page-btns {
        display: flex;
        gap: 10px;
    }

    .asd-empty-hint {
        text-align: center;
        padding: 60px 20px;
        color: rgba(255, 255, 255, 0.4);
    }

    .asd-empty-hint i {
        font-size: 2.5rem;
        color: rgba(0, 210, 255, 0.2);
        margin-bottom: 12px;
        display: block;
    }

    .asd-empty-hint p {
        font-size: 0.9rem;
        font-style: italic;
    }

    .asd-row-inactive {
        filter: saturate(0.35);
        opacity: 0.75;
    }

    .asd-time-cell {
        font-family: 'Consolas', 'Monaco', monospace;
        color: rgba(78, 205, 196, 0.9);
    }

    .asd-hours-cell {
        font-family: 'Consolas', 'Monaco', monospace;
        font-weight: 600;
        color: var(--primary-blue);
    }

    .asd-date-cell {
        font-family: 'Consolas', 'Monaco', monospace;
    }

    .asd-profile-actions {
        display: flex;
        gap: 10px;
        flex-shrink: 0;
    }
</style>
{% endblock %}

{% block content %}
<div class="asd-page" id="asd-page">
    <a href="/attendance-staff/" class="asd-back-btn">
        <i class="bi bi-arrow-left"></i>
        返回人员列表
    </a>

    <div class="asd-section" id="asd-profile-section">
        <div id="asd-profile-content">
        </div>
    </div>

    <div class="asd-section">
        <div class="asd-section-title">
            <i class="bi bi-bar-chart-line-fill"></i>
            <span>考勤汇总</span>
        </div>
        <div id="asd-summary-content" class="asd-summary-grid">
        </div>

        <div class="asd-section-title" style="margin-top: 30px;">
            <i class="bi bi-calendar-check-fill"></i>
            <span>考勤记录</span>
        </div>

        <div class="asd-filters">
            <div class="asd-filter-group">
                <label>开始日期</label>
                <input type="date" id="asd-filter-date-start" class="input-tech">
            </div>
            <div class="asd-filter-group">
                <label>结束日期</label>
                <input type="date" id="asd-filter-date-end" class="input-tech">
            </div>
            <div class="asd-filter-group">
                <label>出勤状态</label>
                <select id="asd-filter-att-status" class="input-tech">
                    <option value="">全部状态</option>
                    <option value="present">正常出勤</option>
                    <option value="late">迟到</option>
                    <option value="early_leave">早退</option>
                    <option value="absent">缺勤</option>
                    <option value="leave">请假</option>
                    <option value="overtime">加班</option>
                </select>
            </div>
            <button id="asd-filter-btn" class="btn-tech">
                <i class="bi bi-funnel"></i> 筛选
            </button>
            <button id="asd-reset-btn" class="btn-tech btn-cancel">
                <i class="bi bi-arrow-clockwise"></i> 重置
            </button>
        </div>

        <div class="asd-table-wrapper">
            <table class="asd-table">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>签到时间</th>
                        <th>签退时间</th>
                        <th>工时(小时)</th>
                        <th>出勤状态</th>
                        <th>备注</th>
                    </tr>
                </thead>
                <tbody id="asd-records-body">
                </tbody>
            </table>
        </div>

        <div class="asd-pagination">
            <span id="asd-page-info" class="asd-page-info"></span>
            <div class="asd-page-btns">
                <button id="asd-page-prev" class="btn-tech btn-cancel" disabled>&laquo; 上一页</button>
                <button id="asd-page-next" class="btn-tech btn-cancel" disabled>下一页 &raquo;</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const STAFF_ID = {{ staff_id }};
</script>
<script src="/static/js/attendance_staff_detail.js"></script>
{% endblock %}
